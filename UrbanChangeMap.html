<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<title>Urban Change Detection — จังหวัดเชียงใหม่</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  /* ---- Design tokens (light default) ---- */
  :root {
    color-scheme: light;
    --surface-1:      #fcfcfb;
    --surface-2:      #f9f9f7;
    --text-primary:   #0b0b0b;
    --text-secondary: #52514e;
    --text-muted:     #898781;
    --gridline:       #e1e0d9;
    --border:         rgba(11,11,11,0.10);
    --shadow:         0 2px 10px rgba(11,11,11,0.14), 0 1px 2px rgba(11,11,11,0.08);

    /* diverging: new (warm/red) <-> lost (cool/blue), unchanged = neutral */
    --clr-new:        #e34948;
    --clr-unchanged:  #898781;
    --clr-lost:       #2a78d6;
    --clr-accent:     #2a78d6; /* primary UI accent (active states) */
  }
  @media (prefers-color-scheme: dark) {
    :root:where(:not([data-theme="light"])) {
      color-scheme: dark;
      --surface-1:      #1a1a19;
      --surface-2:      #0d0d0d;
      --text-primary:   #ffffff;
      --text-secondary: #c3c2b7;
      --text-muted:     #898781;
      --gridline:       #2c2c2a;
      --border:         rgba(255,255,255,0.10);
      --shadow:         0 2px 14px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.3);

      --clr-new:        #e66767;
      --clr-unchanged:  #a3a199;
      --clr-lost:       #3987e5;
      --clr-accent:     #3987e5;
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --surface-1:      #1a1a19;
    --surface-2:      #0d0d0d;
    --text-primary:   #ffffff;
    --text-secondary: #c3c2b7;
    --text-muted:     #898781;
    --gridline:       #2c2c2a;
    --border:         rgba(255,255,255,0.10);
    --shadow:         0 2px 14px rgba(0,0,0,0.45), 0 1px 2px rgba(0,0,0,0.3);

    --clr-new:        #e66767;
    --clr-unchanged:  #a3a199;
    --clr-lost:       #3987e5;
    --clr-accent:     #3987e5;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--surface-2);
    color: var(--text-primary);
  }

  /* ---- App header ---- */
  #app-header {
    position: absolute; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px;
    padding: 10px 16px;
    background: var(--surface-1);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--shadow);
  }
  #app-header h1 {
    font-size: 15px; font-weight: 600; margin: 0; line-height: 1.3;
  }
  #app-header .subtitle {
    font-size: 12px; color: var(--text-secondary); margin-top: 1px;
  }
  #theme-toggle {
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text-primary);
    border-radius: 8px;
    width: 34px; height: 34px;
    font-size: 15px;
    cursor: pointer;
    flex: none;
  }
  #theme-toggle:hover { background: var(--gridline); }

  #map-wrap { position: absolute; top: 56px; bottom: 0; left: 0; right: 0; }
  #map { position: absolute; inset: 0; }

  .panel {
    background: var(--surface-1);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: var(--shadow);
    padding: 12px 14px;
    font-size: 13px;
    color: var(--text-primary);
  }
  .panel-title {
    font-weight: 600; font-size: 12px;
    color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.03em;
    margin-bottom: 8px;
  }

  /* ---- Segmented mode control ---- */
  .mode-panel { display: flex; gap: 2px; padding: 3px; background: var(--surface-2); border-radius: 10px; border: 1px solid var(--border); box-shadow: var(--shadow); }
  .mode-btn {
    border: none;
    background: transparent;
    color: var(--text-secondary);
    padding: 7px 13px;
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: background 0.12s, color 0.12s;
  }
  .mode-btn:hover { background: var(--gridline); }
  .mode-btn.active { background: var(--clr-accent); color: #fff; }
  .year-select {
    border: none;
    background: var(--surface-1);
    color: var(--text-primary);
    border-radius: 7px;
    padding: 7px 8px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    border-left: 1px solid var(--border);
    margin-left: 2px;
  }

  /* ---- Legend ---- */
  .legend-row { display: flex; align-items: center; gap: 8px; margin: 5px 0; color: var(--text-secondary); }
  .legend-swatch { display: inline-block; width: 11px; height: 11px; border-radius: 3px; flex: none; }
  .legend-note { color: var(--text-muted); margin-top: 8px; font-size: 11.5px; line-height: 1.5; border-top: 1px solid var(--gridline); padding-top: 8px; }

  /* ---- Stat tiles ---- */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
  .stat-tile {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .stat-tile .label { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text-secondary); margin-bottom: 3px; }
  .stat-tile .value { font-size: 17px; font-weight: 600; color: var(--text-primary); white-space: nowrap; }
  .stat-tile .unit { display: block; font-size: 10px; font-weight: 400; color: var(--text-muted); margin-top: 1px; }

  /* ---- District table ---- */
  .district-panel { width: 300px; max-height: 58vh; display: flex; flex-direction: column; }
  .district-panel table { border-collapse: collapse; font-size: 12px; width: 100%; }
  .district-panel th {
    position: sticky; top: 0; background: var(--surface-1);
    text-align: right; padding: 4px 6px; color: var(--text-muted);
    font-weight: 500; font-size: 11px;
    border-bottom: 1px solid var(--gridline);
  }
  .district-panel th:first-child { text-align: left; }
  .district-panel th .dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:4px; vertical-align:1px; }
  .district-panel tbody { display: block; overflow-y: auto; max-height: 42vh; }
  .district-panel thead, .district-panel tbody tr { display: table; width: 100%; table-layout: fixed; }
  .district-panel td {
    padding: 5px 6px; text-align: right;
    font-variant-numeric: tabular-nums;
    color: var(--text-primary);
    border-bottom: 1px solid var(--gridline);
  }
  .district-panel td:first-child { text-align: left; color: var(--text-secondary); font-variant-numeric: normal; }
  .district-panel tbody tr { cursor: pointer; }
  .district-panel tbody tr:hover td { background: var(--gridline); }
  .district-panel tbody tr.selected td { background: color-mix(in srgb, var(--clr-accent) 16%, transparent); }
  .district-hint { color: var(--text-muted); margin-top: 8px; font-size: 11px; }

  .leaflet-control-attribution { font-size: 10px; }
</style>
</head>
<body>

<div id="app-header">
  <div>
    <h1>Urban Change Detection</h1>
    <div class="subtitle" id="header-subtitle">จังหวัดเชียงใหม่ &middot; จำแนกด้วย Deep Learning (Dynamic World V1)</div>
  </div>
  <button id="theme-toggle" title="สลับโหมดสี (light/dark)">&#9680;</button>
</div>

<div id="map-wrap">
  <div id="map"></div>
</div>

<script>
const RESULT = {
  "province": "Chiang Mai",
  "aoi_bounds": [98.01456380739785, 17.274874081399023, 99.57594930226234, 20.14622306017309],
  "baseline_year": 2020,
  "compare_years": [2022, 2023, 2025],
  "urban_threshold": 0.5,
  "year_tile_urls": {
    "2020": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/5122b3fda8ac7752d0925ccbcb324dee-83ef2df2e48a49244f22a31c35d5982e/tiles/{z}/{x}/{y}",
    "2022": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/ce5478bae8d052359a7b11b02ea435ed-5295fe6db1c3efba661c8d0e8959e3e5/tiles/{z}/{x}/{y}",

    "2025": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/457ad158b48ff8ee0e43d0785ce1d104-238006090ebfc1c1443c0c5ed416841d/tiles/{z}/{x}/{y}"
  },

    "2020_2022": {"tile_urls": {"new_urban": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/7785069a37509af20d37a8fa652ce37d-1e0d93f728c528a79979e62eeba53350/tiles/{z}/{x}/{y}", "unchanged_urban": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/32fa73d60769910ce9d750e79f066da7-ba3804e823b8c7c8e2f08a63c903a061/tiles/{z}/{x}/{y}", "lost_urban": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/3c2744ae23fc3857884f4993a8c0ae0a-0f6d2f68d16faf944ff6b835c5541dda/tiles/{z}/{x}/{y}"}, "stats_km2": {"new_urban": 139.12, "unchanged_urban": 585.9, "lost_urban": 20.3, "non_urban": 21444.86}},
    "2020_2023": {"tile_urls": {"new_urban": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/4f21e871364c04243755a8a26853442e-5ff8818610f80f41e37729688ed9c68e/tiles/{z}/{x}/{y}", "unchanged_urban": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/b5404011724b2ef6055eace7f3d63316-21105d5e04feef85fdc89e6d33b8d73f/tiles/{z}/{x}/{y}", "lost_urban": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/285822c5a626f2a85a5e60a4526a103e-178dd1c803456dcadd9cbbea676b32d2/tiles/{z}/{x}/{y}"}, "stats_km2": {"new_urban": 74.73, "unchanged_urban": 548.63, "lost_urban": 57.57, "non_urban": 21509.25}},
    "2020_2025": {"tile_urls": {"new_urban": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/d5e013a66c22e1a19241dc140b3e014d-f7be3c29421120b27fe22df7656611f4/tiles/{z}/{x}/{y}", "unchanged_urban": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/45c723d7c7da4a5e34488513fe3ce8c1-75ff31296248c596b8aaf41408fbfc82/tiles/{z}/{x}/{y}", "lost_urban": "https://earthengine.googleapis.com/v1/projects/peak-plasma-485606-u1/maps/5a8409ebe849d3fca95346fa7c8fdaa7-005ad6358caef1f4823a982b91181f7f/tiles/{z}/{x}/{y}"}, "stats_km2": {"new_urban": 160.42, "unchanged_urban": 571.47, "lost_urban": 34.73, "non_urban": 21423.55}}
  },
  "district_baseline": {"year_before": 2020, "year_after": 2025},
  "district_stats_km2": [
    {"district": "San Sai", "non_urban": 272.63, "new_urban": 20.96, "unchanged_urban": 55.85, "lost_urban": 1.31, "lon": 99.03554204178664, "lat": 18.95093673926652},
    {"district": "Mae Rim", "non_urban": 404.95, "new_urban": 13.59, "unchanged_urban": 30.21, "lost_urban": 1.33, "lon": 98.87760003412744, "lat": 18.9401015427179},
    {"district": "Doi Saket", "non_urban": 611.83, "new_urban": 11.99, "unchanged_urban": 22.34, "lost_urban": 0.78, "lon": 99.22221303913521, "lat": 18.937183386180322},
    {"district": "San Kamphaeng", "non_urban": 657.4, "new_urban": 11.96, "unchanged_urban": 38.75, "lost_urban": 1.6, "lon": 99.25651189522912, "lat": 18.736490433481187},
    {"district": "Mae Taeng", "non_urban": 1380.3, "new_urban": 9.98, "unchanged_urban": 19.91, "lost_urban": 1.03, "lon": 98.8549875590548, "lat": 19.17732573498649},
    {"district": "Saraphi", "non_urban": 58.34, "new_urban": 9.8, "unchanged_urban": 40.4, "lost_urban": 1.25, "lon": 99.02223097988644, "lat": 18.694955253850438},
    {"district": "Fang", "non_urban": 812.97, "new_urban": 9.7, "unchanged_urban": 32.9, "lost_urban": 1.1, "lon": 99.16602439093872, "lat": 19.884197970361004},
    {"district": "Chiang Dao", "non_urban": 2148.57, "new_urban": 9.65, "unchanged_urban": 20.74, "lost_urban": 0.82, "lon": 98.90481608810038, "lat": 19.507428151070414},
    {"district": "Muang Chiang Mai", "non_urban": 81.78, "new_urban": 9.0, "unchanged_urban": 82.26, "lost_urban": 1.62, "lon": 98.97035532508762, "lat": 18.792025438116124},
    {"district": "Hang Dong", "non_urban": 222.08, "new_urban": 8.68, "unchanged_urban": 40.64, "lost_urban": 2.1, "lon": 98.8861011115771, "lat": 18.734878714208715},
    {"district": "Chom Thong", "non_urban": 1273.28, "new_urban": 7.23, "unchanged_urban": 39.73, "lost_urban": 5.69, "lon": 98.63540774439058, "lat": 18.397641128546898},
    {"district": "Mae Ai", "non_urban": 792.69, "new_urban": 6.33, "unchanged_urban": 17.6, "lost_urban": 0.45, "lon": 99.34128543477715, "lat": 20.000027810995626},
    {"district": "San Pa Tong", "non_urban": 133.52, "new_urban": 6.09, "unchanged_urban": 35.16, "lost_urban": 3.1, "lon": 98.87975666218485, "lat": 18.60380481416428},
    {"district": "Chai Prakan", "non_urban": 491.48, "new_urban": 4.28, "unchanged_urban": 14.93, "lost_urban": 0.69, "lon": 99.17629126611097, "lat": 19.677999749553752},
    {"district": "Mae Chaem", "non_urban": 3327.12, "new_urban": 3.9, "unchanged_urban": 10.86, "lost_urban": 2.49, "lon": 98.31182557377409, "lat": 18.663102178810192},
    {"district": "Phrao", "non_urban": 1262.33, "new_urban": 3.79, "unchanged_urban": 18.14, "lost_urban": 1.17, "lon": 99.22176772400735, "lat": 19.289212998791047},
    {"district": "Mae Wang", "non_urban": 635.17, "new_urban": 3.25, "unchanged_urban": 12.3, "lost_urban": 1.47, "lon": 98.66018913129336, "lat": 18.67039197719952},
    {"district": "Omkoi", "non_urban": 2743.53, "new_urban": 3.2, "unchanged_urban": 5.25, "lost_urban": 1.57, "lon": 98.3363656663336, "lat": 17.683051083792872},
    {"district": "Samoeng", "non_urban": 1014.98, "new_urban": 2.24, "unchanged_urban": 4.16, "lost_urban": 0.73, "lon": 98.63665163420927, "lat": 18.910483152715283},
    {"district": "Hot", "non_urban": 1434.45, "new_urban": 2.01, "unchanged_urban": 12.5, "lost_urban": 2.36, "lon": 98.47964857394287, "lat": 18.11560228295108},
    {"district": "Wiang Haeng", "non_urban": 710.19, "new_urban": 1.62, "unchanged_urban": 7.84, "lost_urban": 0.54, "lon": 98.65603893958578, "lat": 19.590128091534318},
    {"district": "Doi Tao", "non_urban": 953.88, "new_urban": 1.18, "unchanged_urban": 9.01, "lost_urban": 1.5, "lon": 98.66027489531292, "lat": 17.89833146265418}
  ]
};

/* ---- Theme toggle ---- */
const root = document.documentElement;
const savedTheme = localStorage.getItem("ucd-theme");
if (savedTheme) root.setAttribute("data-theme", savedTheme);
document.getElementById("theme-toggle").addEventListener("click", () => {
  const current = root.getAttribute("data-theme") ||
    (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
  const next = current === "dark" ? "light" : "dark";
  root.setAttribute("data-theme", next);
  localStorage.setItem("ucd-theme", next);
});

/* ---- Map ---- */
const map = L.map("map", { zoomControl: true });
map.setView([18.85, 98.98], 11); // urban core (Chiang Mai city + San Sai / Mae Rim / Doi Saket)

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  attribution: "&copy; OpenStreetMap contributors",
  maxZoom: 19,
}).addTo(map);

function eeLayer(urlFormat) {
  return L.tileLayer(urlFormat, { maxZoom: 19, opacity: 0.75 });
}

const baselineYear = RESULT.baseline_year;
let currentAfterYear = RESULT.compare_years[RESULT.compare_years.length - 1];

const beforeLayer = eeLayer(RESULT.year_tile_urls[String(baselineYear)]);
let afterLayers = null; // built by buildAfterLayers()

function pairFor(year) {
  return RESULT.pair_data[`${baselineYear}_${year}`];
}

function buildAfterLayers(year) {
  const pair = pairFor(year);
  return {
    after: eeLayer(RESULT.year_tile_urls[String(year)]),
    newUrban: eeLayer(pair.tile_urls.new_urban),
    unchangedUrban: eeLayer(pair.tile_urls.unchanged_urban),
    lostUrban: eeLayer(pair.tile_urls.lost_urban),
  };
}
afterLayers = buildAfterLayers(currentAfterYear);

L.control.attribution({ prefix: false }).addTo(map);

document.getElementById("header-subtitle").textContent =
  `จังหวัดเชียงใหม่ · จำแนกด้วย Deep Learning (Dynamic World V1) · ปีฐาน ${baselineYear}`;

/* ---- Mode control (top-left) ---- */
const ModeControl = L.Control.extend({
  options: { position: "topleft" },
  onAdd: function () {
    const div = L.DomUtil.create("div", "mode-panel");
    const yearOptions = RESULT.compare_years
      .map((y) => `<option value="${y}" ${y === currentAfterYear ? "selected" : ""}>${y}</option>`)
      .join("");
    div.innerHTML = `
      <button class="mode-btn active" data-mode="before">ปีฐาน ${baselineYear}</button>
      <button class="mode-btn" data-mode="after">ปี <span id="after-year-label">${currentAfterYear}</span></button>
      <button class="mode-btn" data-mode="change">เปลี่ยนแปลง</button>
      <select class="year-select" id="year-select" title="เลือกปีเปรียบเทียบ">${yearOptions}</select>
    `;
    L.DomEvent.disableClickPropagation(div);
    div.querySelectorAll(".mode-btn").forEach((btn) => {
      btn.addEventListener("click", () => setMode(btn.dataset.mode));
    });
    div.querySelector("#year-select").addEventListener("change", (e) => {
      [afterLayers.after, afterLayers.newUrban, afterLayers.unchangedUrban, afterLayers.lostUrban].forEach(
        (l) => map.hasLayer(l) && map.removeLayer(l)
      );
      currentAfterYear = parseInt(e.target.value, 10);
      document.getElementById("after-year-label").textContent = currentAfterYear;
      afterLayers = buildAfterLayers(currentAfterYear);
      const activeMode = document.querySelector(".mode-btn.active").dataset.mode;
      setMode(activeMode);
    });
    return div;
  },
});
new ModeControl().addTo(map);

/* ---- Legend + stat tiles (top-right) ---- */
const InfoControl = L.Control.extend({
  options: { position: "topright" },
  onAdd: function () {
    const div = L.DomUtil.create("div", "panel");
    div.style.width = "264px";
    div.id = "info-panel";
    L.DomEvent.disableClickPropagation(div);
    return div;
  },
});
new InfoControl().addTo(map);

function legendHtmlFor(mode) {
  if (mode === "before") {
    return `
      <div class="legend-row"><span class="legend-swatch" style="background:var(--clr-new)"></span>พื้นที่เมือง (built-up)</div>
      <div class="legend-note">จำแนกด้วย Deep Learning (Dynamic World V1) จากภาพ Sentinel-2 ปี ${baselineYear}</div>
    `;
  }
  if (mode === "after") {
    return `
      <div class="legend-row"><span class="legend-swatch" style="background:var(--clr-new)"></span>พื้นที่เมือง (built-up)</div>
      <div class="legend-note">จำแนกด้วย Deep Learning (Dynamic World V1) จากภาพ Sentinel-2 ปี ${currentAfterYear}</div>
    `;
  }
  return `
    <div class="legend-row"><span class="legend-swatch" style="background:var(--clr-new)"></span>เมืองใหม่ (${baselineYear} &rarr; ${currentAfterYear})</div>
    <div class="legend-row"><span class="legend-swatch" style="background:var(--clr-unchanged)"></span>เมืองเดิม (ไม่เปลี่ยนแปลง)</div>
    <div class="legend-row"><span class="legend-swatch" style="background:var(--clr-lost)"></span>ลดจากเมือง (rare)</div>
    <div class="legend-note">ตรวจจับการเปลี่ยนแปลงอัตโนมัติจากผลจำแนก Deep Learning สองช่วงเวลา</div>
  `;
}

function statsHtmlFor(year) {
  const s = pairFor(year).stats_km2;
  return `
    <div class="stat-grid">
      <div class="stat-tile">
        <div class="label"><span class="legend-swatch" style="background:var(--clr-new)"></span>เมืองใหม่</div>
        <div class="value">${s.new_urban.toLocaleString()}<span class="unit">ตร.กม.</span></div>
      </div>
      <div class="stat-tile">
        <div class="label"><span class="legend-swatch" style="background:var(--clr-unchanged)"></span>เมืองเดิม</div>
        <div class="value">${s.unchanged_urban.toLocaleString()}<span class="unit">ตร.กม.</span></div>
      </div>
      <div class="stat-tile">
        <div class="label"><span class="legend-swatch" style="background:var(--clr-lost)"></span>ลดจากเมือง</div>
        <div class="value">${s.lost_urban.toLocaleString()}<span class="unit">ตร.กม.</span></div>
      </div>
      <div class="stat-tile">
        <div class="label"><span class="legend-swatch" style="background:var(--gridline)"></span>ไม่ใช่เมือง</div>
        <div class="value">${s.non_urban.toLocaleString()}<span class="unit">ตร.กม.</span></div>
      </div>
    </div>
  `;
}

function renderInfoPanel(mode) {
  document.getElementById("info-panel").innerHTML =
    `<div class="panel-title">Legend</div>${legendHtmlFor(mode)}${statsHtmlFor(currentAfterYear)}`;
}

/* ---- District table (bottom-right) ---- */
const DistrictControl = L.Control.extend({
  options: { position: "bottomleft" },
  onAdd: function () {
    const div = L.DomUtil.create("div", "panel district-panel");
    const rows = RESULT.district_stats_km2
      .map(
        (d, i) => `
      <tr data-lat="${d.lat}" data-lon="${d.lon}" data-idx="${i}">
        <td>${d.district}</td>
        <td>${d.new_urban.toFixed(2)}</td>
        <td>${d.unchanged_urban.toFixed(2)}</td>
      </tr>`
      )
      .join("");
    div.innerHTML = `
      <div class="panel-title">อำเภอ &mdash; เรียงตามเมืองใหม่ (ตร.กม.)</div>
      <div style="color:var(--text-muted); font-size:11px; margin:-4px 0 8px;">
        อ้างอิงช่วง ${RESULT.district_baseline.year_before} &rarr; ${RESULT.district_baseline.year_after}
      </div>
      <table>
        <thead><tr>
          <th>อำเภอ</th>
          <th><span class="dot" style="background:var(--clr-new)"></span>ใหม่</th>
          <th><span class="dot" style="background:var(--clr-unchanged)"></span>เดิม</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="district-hint">คลิกแถวเพื่อซูมไปยังอำเภอนั้น</div>
    `;
    L.DomEvent.disableClickPropagation(div);
    div.querySelectorAll("tbody tr").forEach((tr) => {
      tr.addEventListener("click", () => {
        div.querySelectorAll("tbody tr").forEach((r) => r.classList.remove("selected"));
        tr.classList.add("selected");
        const lat = parseFloat(tr.dataset.lat);
        const lon = parseFloat(tr.dataset.lon);
        if (!isNaN(lat) && !isNaN(lon)) map.flyTo([lat, lon], 11);
      });
    });
    return div;
  },
});
new DistrictControl().addTo(map);

function setMode(mode) {
  [beforeLayer, afterLayers.after, afterLayers.newUrban, afterLayers.unchangedUrban, afterLayers.lostUrban].forEach(
    (l) => map.hasLayer(l) && map.removeLayer(l)
  );
  document.querySelectorAll(".mode-btn").forEach((b) => b.classList.remove("active"));
  document.querySelector(`.mode-btn[data-mode="${mode}"]`).classList.add("active");

  if (mode === "before") beforeLayer.addTo(map);
  else if (mode === "after") afterLayers.after.addTo(map);
  else if (mode === "change") {
    afterLayers.unchangedUrban.addTo(map);
    afterLayers.lostUrban.addTo(map);
    afterLayers.newUrban.addTo(map);
  }
  renderInfoPanel(mode);
}

setMode("before");
</script>
</body>
</html>
